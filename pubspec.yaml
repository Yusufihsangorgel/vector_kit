name: vector_kit
description: "SIMD-accelerated vector math for embeddings: dot product, cosine similarity, normalization, and top-k search over packed matrices."
version: 0.2.1
repository: https://github.com/Yusufihsangorgel/vector_kit
issue_tracker: https://github.com/Yusufihsangorgel/vector_kit/issues
documentation: https://github.com/Yusufihsangorgel/vector_kit#readme
topics:
  - simd
  - vectors
  - embeddings
  - similarity
  - performance

screenshots:
  - description: >-
      Nanoseconds per 768-dimension dot product against scalar loops, and
      milliseconds per top-10 cosine query over 10,000 and 100,000 vectors
      against a full scan and sort.
    path: doc/bench.png

environment:
  sdk: ^3.8.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
